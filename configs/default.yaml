experiment_name: baseline_dummy
seed: 42

data:
  batch_size: 16
  input_shape: [3, 32, 32]
  num_classes: 10
  train_samples: 256
  val_samples: 64
  test_samples: 64
  num_workers: 0

model:
  hidden_dim: 128
  learning_rate: 0.001

trainer:
  max_epochs: 3
  accelerator: auto
  devices: 1
  deterministic: true
  log_every_n_steps: 1
  enable_progress_bar: true
  limit_train_batches: 1.0
  limit_val_batches: 1.0
